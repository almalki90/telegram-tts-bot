name: Historical Story Bot

on:
  schedule:
    # 10 times a day between 9 AM and 10 PM (KSA Time = UTC+3)
    # 9 AM KSA = 6 AM UTC
    # 10 PM KSA = 7 PM UTC (19:00 UTC)
    # Running at hours: 06, 07, 09, 10, 12, 13, 15, 16, 18, 19 (UTC)
    - cron: '0 6,7,9,10,12,13,15,16,18,19 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run bot script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python bot.py
