name: Run Telegram Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *' # يعمل كل 5 دقائق لإبقاء البوت حياً
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI==4.15.4 gTTS==2.5.1
        
    - name: Run Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        # نجعل البوت يعمل لمدة 4 دقائق ثم يتوقف بسلاسة لتستلم الوظيفة التالية العمل
        timeout 240s python bot.py || true
